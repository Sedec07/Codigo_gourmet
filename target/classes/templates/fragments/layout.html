<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<body>

<header th:fragment="topbar" class="topbar">
  <div class="topbar__left">
    <span class="topbar__logo">Código Gourmet</span>
  </div>
  <nav class="topbar__nav">
    <a th:href="@{/dashboard}" class="topbar__link">Dashboard</a>
    <a th:href="@{/pedido}" class="topbar__link">Nuevo Pedido</a>
    <a th:href="@{/ventas/historial}" class="topbar__link">Ventas</a>
    <a th:href="@{/ingredientes}" class="topbar__link">Ingredientes</a>
    <a th:href="@{/recetas}" class="topbar__link">Recetas</a>
  </nav>
  <div class="topbar__right">
    <span class="topbar__badge">PRO</span>
    <span class="topbar__user" sec:authentication="name">usuario</span>
    <span class="topbar__time" th:text="${#temporals != null ? #temporals.format(#temporals.createNow(), 'HH:mm') : ''}">00:00</span>
    <form th:action="@{/logout}" method="post" class="topbar__logout-form">
      <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}">
      <button type="submit" class="topbar__logout">Salir</button>
    </form>
  </div>
</header>

<nav th:fragment="tabs(activeTab)" class="tabs">
  <a th:href="@{/dashboard}" th:classappend="${activeTab == 'dashboard'} ? 'tabs__item--active' : ''" class="tabs__item">Mostrador</a>
  <a th:href="@{/pedido}" th:classappend="${activeTab == 'pedido'} ? 'tabs__item--active' : ''" class="tabs__item">Nuevo Pedido</a>
  <a th:href="@{/ventas/historial}" th:classappend="${activeTab == 'ventas'} ? 'tabs__item--active' : ''" class="tabs__item">Ventas</a>
  <a th:href="@{/ingredientes}" th:classappend="${activeTab == 'ingredientes'} ? 'tabs__item--active' : ''" class="tabs__item">Ingredientes</a>
  <a th:href="@{/recetas}" th:classappend="${activeTab == 'recetas'} ? 'tabs__item--active' : ''" class="tabs__item">Recetas</a>
</nav>

</body>
</html>
