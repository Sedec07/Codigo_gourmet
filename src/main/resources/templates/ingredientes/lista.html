<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Ingredientes — Código Gourmet</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body>
<div class="app-layout">
    <div th:insert="~{fragments/layout :: topbar}"></div>
    <div th:insert="~{fragments/layout :: tabs(activeTab='ingredientes')}"></div>
    <main class="main-content">

        <header class="page-header">
            <h1>Ingredientes</h1>
            <p class="tagline">Inventario en memoria</p>
        </header>

        <div class="card">
            <div style="display:flex; justify-content:flex-end;">
                <a class="btn btn--primary" th:href="@{/ingredientes/nuevo}">+ Registrar ingrediente</a>
            </div>
        </div>

        <div class="card">
            <h2>Listado</h2>
            <div class="table-wrap" th:if="${not #lists.isEmpty(ingredientes)}">
                <table class="data-table">
                    <thead>
                    <tr>
                        <th>Id</th>
                        <th>Nombre</th>
                        <th class="num">Cantidad disponible</th>
                        <th class="num">Costo</th>
                        <th>Unidad</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="ing : ${ingredientes}">
                        <td th:text="${ing.id}">0</td>
                        <td th:text="${ing.nombre}">—</td>
                        <td class="num" th:text="${#numbers.formatDecimal(ing.cantidadDisponible, 1, 2)}">0</td>
                        <td class="num">$<span th:text="${#numbers.formatDecimal(ing.costo, 1, 2)}">0</span></td>
                        <td th:text="${ing.unidad}">—</td>
                    </tr>
                    </tbody>
                </table>
            </div>
            <p th:if="${#lists.isEmpty(ingredientes)}" class="meta-line" style="margin:0;">No hay ingredientes registrados.</p>
        </div>

        <p class="link-back"><a th:href="@{/dashboard}">← Volver al dashboard</a></p>
    </main>
</div>
</body>
</html>
