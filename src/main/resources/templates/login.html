<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Código Gourmet</title>
    <link rel="stylesheet" th:href="@{/css/app.css}">
</head>
<body class="login-page">

<div class="login-card">
    <div class="login-card__header">
        <h1>Código Gourmet</h1>
        <p>Ingreso al sistema</p>
    </div>
    <div class="login-card__body">
        <p class="alert alert--error" th:if="${param.error}">Usuario o contraseña incorrectos.</p>
        <p class="alert alert--success" th:if="${param.logout}">Sesión cerrada correctamente.</p>

        <form th:action="@{/login}" method="post" class="form-stack">
            <div class="field">
                <label for="username">Usuario</label>
                <input id="username" name="username" type="text" autocomplete="username" required autofocus>
            </div>
            <div class="field">
                <label for="password">Contraseña</label>
                <input id="password" name="password" type="password" autocomplete="current-password" required>
            </div>
            <div class="form-actions">
                <button type="submit" class="btn btn--primary btn--block">Ingresar</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
